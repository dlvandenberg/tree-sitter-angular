name: Tag and release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Manually set release version
        required: false
        type: string
      dry_run:
        description: Dry run
        required: false
        type: boolean
        default: false

jobs:
  tag_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up tree-sitter
        if: ${{ !inputs.dry_run }}
        uses: tree-sitter/setup-action/cli@v2

      - name: Determine next version
        uses: mathieudutour/github-tag-action@v6.2
        id: tag_version
        with:
          custom_tag: ${{ inputs.version }}
          github_token: ${{ secrets.RELEASE_TOKEN }}
          dry_run: true

      - name: Bump versions in source files
        if: ${{ !inputs.dry_run }}
        run: ./scripts/bump-version.sh "${{ steps.tag_version.outputs.new_version }}"

      - name: Install dependencies
        if: ${{ !inputs.dry_run }}
        run: npm ci && npm i --package-lock-only

      - name: Build
        if: ${{ !inputs.dry_run }}
        run: npm run build && cargo build

      - name: Commit version bump
        id: commit
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.tag_version.outputs.new_version }}"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: ${{ !inputs.dry_run }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          custom_tag: ${{ steps.tag_version.outputs.new_version }}
          github_token: ${{ secrets.RELEASE_TOKEN }}
          commit_sha: ${{ steps.commit.outputs.sha }}

      - name: Create release
        if: ${{ !inputs.dry_run }}
        uses: ncipollo/release-action@v1.15.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: ${{ steps.tag_version.outputs.new_version }}
          body: ${{ steps.tag_version.outputs.changelog }}

